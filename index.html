<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tag Prompt Manager & Translator</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts & FontAwesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
      background: radial-gradient(120% 120% at 50% 10%, #f0f7ff 0%, #e0eefe 100%);
      min-height: 100vh;
    }
    .monospace {
      font-family: 'JetBrains Mono', monospace;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .glass-tag {
      background: rgba(219, 234, 254, 0.75);
      border: 1px solid rgba(191, 219, 254, 0.8);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-tag:hover {
      background: rgba(191, 219, 254, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
    }
    .glass-tag.dragging {
      opacity: 0.4;
      transform: scale(0.95);
      border: 2px dashed #3b82f6;
    }
    .glass-tag.drag-over {
      border: 2px dashed #10b981;
      transform: scale(1.05);
    }
    .category-character { border-left: 4px solid #f43f5e !important; }
    .category-clothing { border-left: 4px solid #3b82f6 !important; }
    .category-action { border-left: 4px solid #10b981 !important; }
    .category-background { border-left: 4px solid #f59e0b !important; }
    .category-style { border-left: 4px solid #8b5cf6 !important; }
    .category-misc { border-left: 4px solid #64748b !important; }
    .tag-hidden {
      background: rgba(229, 231, 235, 0.5) !important;
      border-color: rgba(209, 213, 219, 0.6) !important;
      color: #9ca3af !important;
      opacity: 0.6;
      border-left-width: 1px !important;
    }
    .custom-scrollbar::-webkit-scrollbar, ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.5);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(156, 163, 175, 0.8);
    }
    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-scale-in {
      animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-8 flex flex-col items-center">

  <!-- 頂部標題區 -->
  <header class="w-full max-w-5xl flex flex-col items-center mt-4 mb-4 relative">
    <h1 class="text-3xl md:text-4xl font-black text-slate-800 tracking-wider" translate="no">
      標籤翻譯與整理系統
    </h1>
    <p class="text-xs md:text-sm text-slate-500 mt-2 font-medium">整理、排序、多槽轉盤、自動翻譯您的 AI Prompt 標籤</p>
    
    <div id="syncStatusBadge" class="mt-3 px-3 py-1 rounded-full text-xs font-semibold bg-blue-50 text-blue-700 border border-blue-200 flex items-center gap-1.5">
      <i class="fa-solid fa-sync animate-spin" id="statusSpinner"></i>
      <span id="statusText">正在連線 Google 試算表詞庫...</span>
    </div>

    <div class="flex gap-3 mt-6 items-center flex-wrap justify-center">
      <div class="flex items-center gap-1.5 bg-white/60 p-1.5 rounded-full shadow-sm border border-slate-100 backdrop-blur-md">
        <div id="promptTabsContainer" class="flex gap-1"></div>
        <div class="w-px h-5 bg-slate-300 mx-1"></div>
        <button id="addPromptBtn" class="w-8 h-8 rounded-full bg-white text-blue-500 hover:bg-blue-50 hover:text-blue-600 shadow-sm border border-slate-100 flex items-center justify-center transition-all">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>
      <button id="toggleInputBtn" class="flex items-center justify-center gap-2 px-5 py-2.5 rounded-full bg-white shadow-md border border-slate-100 hover:bg-slate-50 text-slate-600 transition-all">
        <i class="fa-solid fa-keyboard text-blue-500"></i> 開啟 Prompt 輸入區
      </button>
    </div>
  </header>

  <!-- 輸入區 Modal -->
  <div id="inputDrawer" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-all">
    <div class="bg-white rounded-3xl w-full max-w-2xl shadow-2xl border border-slate-100 p-6 md:p-8 animate-scale-in flex flex-col">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2" translate="no">
          <i class="fa-solid fa-terminal text-blue-500"></i> 編輯目前 Prompt 槽位
        </h3>
        <button id="closeDrawerBtn" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <p class="text-xs text-slate-500 mb-3">請在下方貼上您整串的 Prompt。支援逗號、換行、句點及大寫 BREAK 拆解。</p>
      <textarea id="rawPromptInput" class="w-full h-80 p-4 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none resize-none monospace text-sm"></textarea>
      <div class="flex justify-end gap-3 mt-6">
        <button id="cancelInputBtn" class="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 active:bg-slate-100 font-medium transition-all text-sm">取消</button>
        <button id="confirmInputBtn" class="px-6 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold transition-all shadow-lg shadow-blue-500/20 text-sm">確認載入 <i class="fa-solid fa-check"></i></button>
      </div>
    </div>
  </div>

  <!-- 主盤面 -->
  <main class="w-full max-w-5xl min-h-[50vh] rounded-3xl glass-card p-6 md:p-8 shadow-xl relative flex flex-col mb-24">
    <div class="flex flex-col md:flex-row justify-between md:items-end gap-4 mb-6 pb-4 border-b border-slate-100/60">
      <div id="categoryLegendContainer" class="flex flex-wrap gap-2.5 text-[11px] md:text-xs font-semibold text-slate-500"></div>
      <button id="addNewTagBtn" class="shrink-0 px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm">
        <i class="fa-solid fa-plus"></i> 新增標籤
      </button>
    </div>
    <div id="tagsContainer" class="flex flex-wrap gap-4 items-center content-start min-h-[30vh]">
      <div id="emptyState" class="w-full py-16 flex flex-col items-center justify-center text-slate-400">
        <div class="w-16 h-16 rounded-full bg-blue-50 flex items-center justify-center mb-4 text-blue-500">
          <i class="fa-solid fa-tags text-2xl"></i>
        </div>
        <p class="font-medium text-slate-600">目前槽位沒有標籤</p>
        <p class="text-xs text-slate-400 mt-1">請點擊上方的按鈕載入 Prompt、新增標籤或是點選右下角貼上</p>
      </div>
    </div>
  </main>

  <!-- 右下快捷按鈕 -->
  <div class="fixed bottom-6 right-6 z-40 flex flex-col gap-3">
    <button id="toggleModeBtn" class="w-14 h-14 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white flex items-center justify-center shadow-lg shadow-indigo-600/30 hover:shadow-xl">
      <i class="fa-solid fa-layer-group text-xl"></i>
    </button>
    <button id="quickCopyBtn" class="w-14 h-14 rounded-full bg-blue-600 hover:bg-blue-700 text-white flex items-center justify-center shadow-lg shadow-blue-600/30 hover:shadow-xl">
      <i class="fa-solid fa-copy text-xl"></i>
    </button>
    <button id="quickPasteBtn" class="w-14 h-14 rounded-full bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 flex items-center justify-center shadow-lg hover:shadow-xl">
      <i class="fa-solid fa-paste text-xl text-slate-500"></i>
    </button>
    <button id="quickClearBtn" class="w-14 h-14 rounded-full bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 flex items-center justify-center shadow-lg hover:shadow-xl">
      <i class="fa-solid fa-trash-can text-xl"></i>
    </button>
  </div>

  <div id="toast" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 bg-slate-900 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 text-sm transition-opacity">
    <i id="toastIcon" class="fa-solid fa-circle-check text-green-400"></i>
    <span id="toastMessage">成功！</span>
  </div>

  <script>
    let databaseTags = [];
    let prompts = [{ id: 'p1', name: '1', tags: [] }];
    let promptCounter = 1;
    let activePromptId = 'p1';
    let categorySlots = {};
    let defaultCategories = ['角色主體', '服裝物品', '動作表達', '背景環境', '風格藝術', '雜代碼'];

    const toggleInputBtn = document.getElementById('toggleInputBtn');
    const inputDrawer = document.getElementById('inputDrawer');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');
    const rawPromptInput = document.getElementById('rawPromptInput');
    const confirmInputBtn = document.getElementById('confirmInputBtn');
    const cancelInputBtn = document.getElementById('cancelInputBtn');
    const promptTabsContainer = document.getElementById('promptTabsContainer');
    const addPromptBtn = document.getElementById('addPromptBtn');
    const tagsContainer = document.getElementById('tagsContainer');
    const emptyState = document.getElementById('emptyState');
    const quickCopyBtn = document.getElementById('quickCopyBtn');
    const quickClearBtn = document.getElementById('quickClearBtn');
    const categoryLegendContainer = document.getElementById('categoryLegendContainer');
    const toggleModeBtn = document.getElementById('toggleModeBtn');

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').innerText = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2000);
    }

    function renderTabs() {
      promptTabsContainer.innerHTML = '';
      prompts.forEach(p => {
        const btn = document.createElement('button');
        btn.className = `px-3.5 py-1.5 rounded-full font-bold text-sm transition-all shadow-sm border ${p.id === activePromptId ? 'bg-blue-100 text-blue-600 border-blue-200' : 'bg-white text-slate-600 hover:bg-slate-50 border-slate-100'}`;
        btn.innerText = `( ${p.name} )`;
        btn.onclick = () => selectTab(p.id);
        promptTabsContainer.appendChild(btn);
      });
    }

    function selectTab(pid) {
      activePromptId = pid;
      renderTabs();
      renderTags();
    }

    function renderTags() {
      tagsContainer.innerHTML = '';
      const activeP = prompts.find(p => p.id === activePromptId);
      if (!activeP || activeP.tags.length === 0) {
        emptyState.classList.remove('hidden');
        tagsContainer.appendChild(emptyState);
        return;
      }
      emptyState.classList.add('hidden');
      activeP.tags.forEach(tag => {
        const div = document.createElement('div');
        div.className = 'glass-tag px-4 py-2.5 rounded-full flex items-center gap-2 text-sm font-semibold';
        div.innerHTML = `<i class="fa-solid fa-plus text-xs text-blue-300"></i> <span class="text-blue-400 font-mono">${tag.cleanWord || tag.word}</span>`;
        tagsContainer.appendChild(div);
      });
    }

    function renderCategoryLegends() {
      categoryLegendContainer.innerHTML = '';
      defaultCategories.forEach(cat => {
        const span = document.createElement('span');
        span.className = 'flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-slate-50 text-slate-600';
        span.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-400"></span> ${cat}`;
        categoryLegendContainer.appendChild(span);
      });
    }

    toggleInputBtn.addEventListener('click', () => inputDrawer.classList.remove('hidden'));
    closeDrawerBtn.addEventListener('click', () => inputDrawer.classList.add('hidden'));
    cancelInputBtn.addEventListener('click', () => inputDrawer.classList.add('hidden'));

    confirmInputBtn.addEventListener('click', () => {
      const text = rawPromptInput.value.trim();
      if (text) {
        const activeP = prompts.find(p => p.id === activePromptId);
        if (activeP) {
          activeP.tags = text.split(/[,\n]/).map(t => {
            const trimmed = t.trim();
            return trimmed ? { id: 'tag_' + Math.random().toString(36).substring(2, 11), word: trimmed, cleanWord: trimmed, category: '雜代碼' } : null;
          }).filter(Boolean);
        }
        renderTags();
        inputDrawer.classList.add('hidden');
        rawPromptInput.value = '';
        showToast('Prompt 已載入！');
      }
    });

    addPromptBtn.addEventListener('click', () => {
      promptCounter++;
      const pid = 'p' + Math.random().toString(36).substr(2, 5);
      prompts.push({ id: pid, name: promptCounter.toString(), tags: [] });
      selectTab(pid);
      showToast(`已建立 Prompt ( ${promptCounter} ) 空槽位！`);
    });

    quickCopyBtn.addEventListener('click', () => {
      const activeP = prompts.find(p => p.id === activePromptId);
      if (activeP && activeP.tags.length > 0) {
        const text = activeP.tags.map(t => t.cleanWord).join(', ');
        navigator.clipboard.writeText(text);
        showToast('已複製到剪貼簿！');
      }
    });

    quickClearBtn.addEventListener('click', () => {
      const activeP = prompts.find(p => p.id === activePromptId);
      if (activeP) {
        activeP.tags = [];
        renderTags();
        showToast('已清空當前槽位！');
      }
    });

    renderTabs();
    renderCategoryLegends();
    renderTags();
  </script>
</body>
</html>
